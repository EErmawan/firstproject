<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Absensi Harian Kehadiran Siswa</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: Arial, sans-serif;
        }
        .container {
            text-align: center;
            border: 1px solid #ccc;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
        form {
            text-align: left;
        }
        .form-group {
            display: flex;
            align-items: center;
            margin-bottom: 10px;
        }
        .form-group label {
            width: 100px;
        }
        .form-group input,
        .form-group select {
            flex-grow: 1;
            padding: 5px;
        }
        .radio-group {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
        }
        .radio-container {
            display: flex;
            align-items: center;
            position: relative;
            cursor: pointer;
            font-size: 18px;
        }
        .radio-container input {
            position: absolute;
            opacity: 0;
            cursor: pointer;
        }
        .checkmark {
            width: 20px;
            height: 20px;
            background-color: #eee;
            border-radius: 50%;
            margin-right: 5px;
            display: inline-block;
            position: relative;
        }
        .radio-container input:checked ~ .checkmark {
            background-color: #4CAF50;
        }
        .checkmark:after {
            content: "";
            position: absolute;
            display: none;
        }
        .radio-container input:checked ~ .checkmark:after {
            display: block;
        }
        .radio-container .checkmark:after {
            top: 7px;
            left: 7px;
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: white;
        }
        .entry {
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 style="color: green;">SMK Negeri 15 Pandeglang</h1>
        <h2>Absensi Harian Kehadiran Siswa</h2>
        <form id="form-absensi">
            <div class="form-group">
                <label for="nama">Nama:</label> 
                <input type="text" id="nama" name="nama" required>
            </div>
            <div class="form-group">
                <label for="kelas">Kelas:</label>
                <select id="kelas" name="kelas" required>
                    <option value="" disabled selected>Pilih Kelas</option>
                    <option value="X ATPH">X ATPH</option>
                    <option value="X AKL">X AKL</option>
                    <option value="X DKV">X DKV</option>
                    <option value="XI ATPH">XI ATPH</option>
                    <option value="XI AKL">XI AKL</option>
                    <option value="XI DKV">XI DKV</option>
                    <option value="XII ATPH">XII ATPH</option>
                    <option value="XII AKL">XII AKL</option>
                    <option value="XII DKV">XII DKV</option>
                </select>
            </div>
            <label>Status:</label><br>
            <div class="radio-group">
                <label class="radio-container">Hadir
                    <input type="radio" name="status" value="Hadir" required>
                    <span class="checkmark"></span>
                </label>
                <label class="radio-container">Sakit
                    <input type="radio" name="status" value="Sakit">
                    <span class="checkmark"></span>
                </label>
                <label class="radio-container">Izin
                    <input type="radio" name="status" value="Izin">
                    <span class="checkmark"></span>
                </label>
                <label class="radio-container">Alpa
                    <input type="radio" name="status" value="Alpa">
                    <span class="checkmark"></span>
                </label>
            </div>
            <br><br>
            
            <button type="submit" id="btn-absensi">Simpan</button>
        </form>
        <div id="list-absensi"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
